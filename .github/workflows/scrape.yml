name: Scrape competitor rates

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium
      - name: Run scraper
        run: python run_scraper.py
      - name: Commit results
        run: |
          git config user.name "ktp-rate-scraper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/history
          git diff --quiet --cached || git commit -m "Update rates"
          git push
